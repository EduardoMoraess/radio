<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LouvorPlay - Música Gospel</title>

    <link rel="shortcut icon" href="https://cdn.pixabay.com/photo/2020/09/25/02/56/music-5600363_640.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body>

    <header>
        <div class="container">

            <nav>

                <h2 class="logo">LouvorPlay</h2>

                <div class="menu-toggle" id="menu-toggle">
                    ☰
                </div>

                <ul class="nav-links" id="nav-links">
                    <li onclick="showPage('home')">Início</li>
                    <li onclick="showPage('musicas')">Músicas</li>
                    <li onclick="showPage('favoritos')">Favoritos</li>
                </ul>

                <div class="search-box">
                    <input type="text" id="search" placeholder="Buscar música...">
                </div>

            </nav>
        </div>
    </header>

    <main>

        <section class="hero" id="hero-section">
            <div class="container">
                <h1 id="daily-verse">"O Senhor é o meu pastor, nada me faltará"</h1>
                <p>Salmos 23:1</p>
            </div>
        </section>

        <div class="container">

            <div id="video-player-container"></div>

            <section id="page-home">
                <h2 class="section-title">Lançamentos</h2>
                <div id="latest-grid" class="grid"></div>
            </section>

            <section id="page-musicas" class="hidden">
                <h2 class="section-title">Todas as Músicas</h2>
                <div id="all-songs-grid" class="grid"></div>
            </section>

        </div>

    </main>


    <footer>

        <p>© 2026 LouvorPlay - Música que Transforma</p>

        <button id="btn-abrir-sugestao" class="btn-novo-envio">
            <span>+</span> Sugerir Música
        </button>

        <dialog id="modal-sugestao" class="modal-estilizado">

            <div class="modal-body">

                <h3>Sugerir Música</h3>

                <input 
                    type="text" 
                    id="input-titulo" 
                    placeholder="Título da música" required
                >
                <input 
                    type="text" 
                    id="input-artista" 
                    placeholder="Nome do Artista" required
                >
                <input 
                    type="text" id="input-url" 
                    placeholder="Link do YouTube" required
                >

                <div class="modal-actions">
                    <button id="btn-cancelar-sugestao">Cancelar</button>
                    <button id="btn-enviar-sugestao">Enviar WhatsApp</button>
                </div>

            </div>

        </dialog>

    </footer>

    <script type="module" src="./src/js/main.js"></script>
    <script src="src/js/modalMusic.js"></script>

</body>

</html>
