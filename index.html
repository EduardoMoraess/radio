<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LouvorPlay - Música Gospel</title>

    <link rel="shortcut icon" href="https://cdn.pixabay.com/photo/2020/09/25/02/56/music-5600363_640.png" type="image/x-icon">

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body>

    <header>
        <div class="container">
            <nav>
                <h2 style="font-family: Roboto, sans-serif;">LouvorPlay</h2>

                <!-- BOTÃO MOBILE -->
                <div class="menu-toggle" id="menu-toggle">
                    Menu
                </div>

                <ul class="nav-links" id="nav-links">
                    <li onclick="showPage('home')">Início</li>
                    <li onclick="showPage('musicas')">Músicas</li>
                    <li onclick="showPage('favoritos')">Favoritos</li>
                </ul>

                <div class="search-box">
                    <input 
                        type="text" id="search" placeholder="Buscar..."
                        style="padding: 5px 10px; border-radius: 15px; border: none;"
                    >
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero" id="hero-section">
            <div class="container">
                <h1 id="daily-verse">"O Senhor é o meu pastor, nada me faltará"</h1>
                <p>Salmos 23:1</p>
            </div>
        </section>

        <div class="container">
            <div id="video-player-container"></div>

            <section id="page-home">
                <h2 class="section-title">Lançamentos</h2>
                <div id="latest-grid" class="grid"></div>
            </section>

            <section id="page-musicas" class="hidden">
                <h2 class="section-title">Todas as Músicas</h2>
                <div id="all-songs-grid" class="grid"></div>
            </section>
        </div>
    </main>

    <footer style="background: #222; color: white; text-align: center; padding: 40px 0; margin-top: 50px;">
        <p>© 2026 LouvorPlay - Música que Transforma</p>

        <button id="addMusic">Adicionar musica</button>

        <dialog>
            <span class="info">Deseja Adicionar uma musica?</span>
            <p>
                Se sim, clique no botão abaixo
            </p>
            <button id="music">Adicionar musica</button>
        </dialog>
    </footer>

    <script type="module" src="./src/js/main.js"></script>

</body>

</html>
